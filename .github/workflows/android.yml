name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      PATH: ${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin:$PATH:${{ github.workspace }}/android-sdk/platform-tools:$PATH

    steps:
    # 1️⃣ Baixar o código do repositório
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2️⃣ Configurar Python 3.13
    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    # 3️⃣ Instalar dependências do Buildozer
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install buildozer==1.5.0 python-for-android==2023.9.16 cython flask websocket-client kivy

    # 4️⃣ Instalar Android SDK cmdline-tools
    - name: Install Android SDK cmdline-tools
      run: |
        mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
        cd $ANDROID_SDK_ROOT
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip
        mv cmdline-tools cmdline-tools/latest
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses

    # 5️⃣ Instalar build-tools e plataformas Android
    - name: Install build tools and platforms
      run: |
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;34.0.0"

    # 6️⃣ Build APK com Buildozer
    - name: Build APK
      run: |
        buildozer android debug
        ls -lh bin/

    # 7️⃣ Fazer upload do APK como artefato
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: APK
        path: bin/*.apk
