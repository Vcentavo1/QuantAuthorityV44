name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Pegar o código do repositório
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Configurar Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3️⃣ Instalar dependências do sistema
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git python3-pip python3-venv openjdk-17-jdk unzip zip wget

      # 4️⃣ Instalar Buildozer e Python-for-Android
      - name: Install Buildozer & p4a
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install buildozer python-for-android

      # 5️⃣ Build APK
      - name: Build APK
        run: |
          buildozer android debug

      # 6️⃣ Upload do APK gerado como artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuantAuthorityV44-APK
          path: ./.buildozer/android/platform/build-armeabi-v7a/dists/quantauthority/bin/*.apk
