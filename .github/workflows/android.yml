name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Pegar o código do repositório
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Configurar Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3️⃣ Build Android APK com Buildozer
      - name: Build APK
        uses: ArtemSBulgakov/buildozer-action@v2
        with:
          workdir: .
          buildozer_version: stable
          command: android debug
          requirements: python3,kivy,flask,websocket-client
          android_permissions: INTERNET

      # 4️⃣ Upload do APK gerado como artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: QuantAuthorityV44-APK
          path: ./.buildozer/android/platform/build-armeabi-v7a/dists/quantauthority/bin/*.apk
