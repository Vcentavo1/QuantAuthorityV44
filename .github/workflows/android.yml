name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3 python3-pip python3-venv git unzip wget curl zip build-essential tar openjdk-17-jdk \
          libncurses5 libncurses5-dev libstdc++6

    - name: Setup Python virtual environment
      run: |
        python3 -m venv venv
        source venv/bin/activate
        pip install --upgrade pip setuptools wheel
        pip install buildozer==1.5.0 python-for-android

    - name: Build APK with Buildozer
      run: |
        source venv/bin/activate
        buildozer android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: QuantAuthority-debug-apk
        path: bin/*.apk
